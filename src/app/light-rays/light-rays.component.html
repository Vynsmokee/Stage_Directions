<!--
  SVG Light Ray effect — origin at bottom-center, fanning upward.
  mix-blend-mode: screen on the host SVG ensures glow on dark backgrounds.
  All beams originate from approximately (720, 1300) — bottom center of the 1440×1200 viewBox.
  Color: #da178e (brand magenta/pink) / #ff6ec7 (bright highlight)
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1440 1200"
  preserveAspectRatio="xMidYMax slice"
  aria-hidden="true"
>
  <defs>
    <!-- Blur filters -->
    <filter id="lr-f-xl" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" />
    </filter>
    <filter id="lr-f-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" />
    </filter>

    <!-- Radial glow at origin -->
    <radialGradient
      id="lr-glow"
      cx="720"
      cy="1300"
      r="300"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#ff6ec7">
        <animate
          attributeName="stop-opacity"
          values="0.95;0.6;0.9;0.55;0.95"
          dur="5s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="55%" stop-color="#da178e">
        <animate
          attributeName="stop-opacity"
          values="0.5;0.28;0.45;0.22;0.5"
          dur="5s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="100%" stop-color="#da178e" stop-opacity="0" />
    </radialGradient>

    <!-- Beam gradients — origin #da178e → transparent at tip -->
    <linearGradient
      id="lr-grad-1"
      x1="720"
      y1="1300"
      x2="120"
      y2="0"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#da178e">
        <animate
          attributeName="stop-opacity"
          values="0.72;0.38;0.65;0.28;0.72"
          dur="6s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0" />
    </linearGradient>

    <linearGradient
      id="lr-grad-2"
      x1="720"
      y1="1300"
      x2="380"
      y2="0"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#da178e">
        <animate
          attributeName="stop-opacity"
          values="0.55;0.82;0.40;0.70;0.55"
          dur="8s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0" />
    </linearGradient>

    <linearGradient
      id="lr-grad-3"
      x1="720"
      y1="1300"
      x2="720"
      y2="0"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#ff6ec7">
        <animate
          attributeName="stop-opacity"
          values="0.85;0.48;0.78;0.38;0.85"
          dur="9s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="100%" stop-color="#da178e" stop-opacity="0" />
    </linearGradient>

    <linearGradient
      id="lr-grad-4"
      x1="720"
      y1="1300"
      x2="1050"
      y2="0"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#da178e">
        <animate
          attributeName="stop-opacity"
          values="0.42;0.74;0.32;0.65;0.42"
          dur="11s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0" />
    </linearGradient>

    <linearGradient
      id="lr-grad-5"
      x1="720"
      y1="1300"
      x2="1360"
      y2="0"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#da178e">
        <animate
          attributeName="stop-opacity"
          values="0.68;0.32;0.58;0.40;0.68"
          dur="7s"
          repeatCount="indefinite"
        />
      </stop>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Origin glow ellipse -->
  <ellipse
    cx="720"
    cy="1300"
    rx="320"
    ry="120"
    fill="url(#lr-glow)"
    filter="url(#lr-f-xl)"
  />

  <!-- Beam 1 — far left, widest rake -->
  <path
    d="M 720 1300  L -80 -60  L 260 -60  Z"
    fill="url(#lr-grad-1)"
    filter="url(#lr-f-xl)"
    opacity="0.9"
  />

  <!-- Beam 2 — left-center, narrower -->
  <path
    d="M 720 1300  L 230 -60  L 510 -60  Z"
    fill="url(#lr-grad-2)"
    filter="url(#lr-f-lg)"
    opacity="0.95"
  />

  <!-- Beam 3 — center, tall bright spine -->
  <path
    d="M 720 1300  L 560 -60  L 880 -60  Z"
    fill="url(#lr-grad-3)"
    filter="url(#lr-f-lg)"
    opacity="1"
  />

  <!-- Beam 4 — right-center -->
  <path
    d="M 720 1300  L 910 -60  L 1180 -60  Z"
    fill="url(#lr-grad-4)"
    filter="url(#lr-f-lg)"
    opacity="0.9"
  />

  <!-- Beam 5 — far right, strong rake -->
  <path
    d="M 720 1300  L 1170 -60  L 1560 -60  Z"
    fill="url(#lr-grad-5)"
    filter="url(#lr-f-xl)"
    opacity="0.85"
  />
</svg>
